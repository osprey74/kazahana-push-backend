app = 'kazahana-push-backend'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '30s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[env]
  DATABASE_PATH = '/data/kazahana-push.db'
  LOG_LEVEL = 'info'

[[mounts]]
  source = 'kazahana_push_data'
  destination = '/data'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[restart]]
  policy = 'on-failure'
  retries = 5
